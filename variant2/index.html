<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acronym Foundation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #f0f0f0;
      color: #0f0f0f;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    .logo {
      position: absolute;
      top: 24px;
      left: 24px;
      height: 200px;
      width: auto;
    }

    nav.main-nav {
      position: absolute;
      top: 256px;
      left: 24px;
      display: flex;
      gap: 24px;
    }

    nav a {
      color: #0f0f0f;
      text-decoration: none;
      font-size: 16px;
      letter-spacing: 0.05em;
      opacity: 0;
      animation: fadeIn 0.4s ease forwards;
      position: relative;
    }

    nav.main-nav a:nth-child(1) { animation-delay: 0.1s; }
    nav.main-nav a:nth-child(2) { animation-delay: 0.3s; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background: #0f0f0f;
      transition: width 0.3s ease;
    }

    nav a:hover::after {
      width: 100%;
    }

    .video-wrapper {
      position: absolute;
      bottom: 67px;
      left: -100px;
      width: 100px;
      height: 75px;
      border-radius: 16px;
      cursor: pointer;
      transition: none;
      z-index: 10;
    }

    .video-wrapper video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 16px;
      overflow: hidden;
    }

    .video-wrapper.expanded {
      z-index: 100;
    }

    .video-label {
      position: absolute;
      bottom: -28px;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 14px;
      letter-spacing: 0.03em;
      color: #0f0f0f;
      text-decoration: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .video-label span {
      position: relative;
      display: inline-block;
    }

    .video-label span::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 50%;
      width: 0;
      height: 1px;
      background: #0f0f0f;
      transition: width 0.3s ease, left 0.3s ease;
    }

    .video-label:hover span::after {
      width: 100%;
      left: 0;
    }

    .video-wrapper.expanded .video-label {
      opacity: 1;
      pointer-events: auto;
    }

    nav.contact-nav {
      position: absolute;
      bottom: 24px;
      left: 24px;
    }

    nav.contact-nav a {
      animation-delay: 0.5s;
    }

    .circle {
      position: absolute;
      right: 0;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: #0f0f0f;
      cursor: pointer;
      will-change: transform;
    }

    @media (max-width: 768px) {
      .logo {
        height: 100px;
      }

      .circle {
        width: 100px;
        height: 100px;
      }

      nav.main-nav {
        top: 142px;
        flex-direction: column;
        gap: 16px;
      }

      nav.contact-nav {
        bottom: 20px;
      }

      .video-wrapper {
        bottom: 57px;
      }
    }
  </style>
</head>
<body>
  <img src="../Asset/af-logo.svg" alt="Acronym Foundation" class="logo">

  <nav class="main-nav">
    <a href="#">Amp</a>
    <a href="#">Anvil</a>
  </nav>

  <div class="video-wrapper" id="videoWrapper">
    <video src="../Asset/video.mp4" muted loop playsinline autoplay></video>
    <a class="video-label" id="videoLabel" href="https://www.youtube.com" target="_blank" rel="noopener"><span>Visit our YouTube Channel</span></a>
  </div>

  <nav class="contact-nav">
    <a href="#">Contact</a>
  </nav>

  <div class="circle" id="circle"></div>

  <script>
    // Video slide-in and expand logic
    const videoWrapper = document.getElementById('videoWrapper');
    let videoExpanded = false;
    let videoAnimating = false;

    // Slide in from left on page load
    setTimeout(() => {
      animateVideo(
        { left: -100, bottom: 67, width: 100, height: 75 },
        { left: 24, bottom: 67, width: 100, height: 75 },
        500
      );
    }, 600);

    function collapseVideo() {
      if (videoAnimating) return;
      const currentLeft = parseFloat(videoWrapper.style.left);
      const currentBottom = parseFloat(videoWrapper.style.bottom);
      animateVideo(
        { left: currentLeft, bottom: currentBottom, width: 300, height: 225 },
        { left: 24, bottom: 67, width: 100, height: 75 },
        400
      );
      videoExpanded = false;
      videoWrapper.classList.remove('expanded');
    }

    videoWrapper.querySelector('video').addEventListener('click', (e) => {
      if (videoAnimating) return;

      if (!videoExpanded) {
        const centerLeft = (window.innerWidth - 300) / 2;
        const centerBottom = (window.innerHeight - 225) / 2;
        animateVideo(
          { left: 24, bottom: 67, width: 100, height: 75 },
          { left: centerLeft, bottom: centerBottom, width: 300, height: 225 },
          400
        );
        videoExpanded = true;
        videoWrapper.classList.add('expanded');
      } else {
        collapseVideo();
      }
    });

    function animateVideo(from, to, duration) {
      videoAnimating = true;
      const start = performance.now();

      function step(now) {
        const t = Math.min((now - start) / duration, 1);
        const ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

        const left = from.left + (to.left - from.left) * ease;
        const bottom = from.bottom + (to.bottom - from.bottom) * ease;
        const width = from.width + (to.width - from.width) * ease;
        const height = from.height + (to.height - from.height) * ease;

        videoWrapper.style.left = left + 'px';
        videoWrapper.style.bottom = bottom + 'px';
        videoWrapper.style.width = width + 'px';
        videoWrapper.style.height = height + 'px';

        if (t < 1) {
          requestAnimationFrame(step);
        } else {
          videoAnimating = false;
        }
      }

      requestAnimationFrame(step);
    }

    // Circle bounce logic
    const circle = document.getElementById('circle');
    const gravity = 2400;
    const restitution = 0.5;
    const threshold = 2;

    let y, velocity, floor, animId, size;

    function getSize() {
      return circle.offsetHeight;
    }

    function initBounce() {
      cancelAnimationFrame(animId);
      size = getSize();
      floor = window.innerHeight - size;
      y = -size;
      velocity = 0;
      circle.style.top = y + 'px';
      let last = performance.now();

      function step(now) {
        const dt = Math.min((now - last) / 1000, 0.03);
        last = now;

        velocity += gravity * dt;
        y += velocity * dt;

        if (y >= floor) {
          y = floor;
          velocity = -velocity * restitution;
          if (Math.abs(velocity) < threshold) {
            y = floor;
            circle.style.top = y + 'px';
            return;
          }
        }

        circle.style.top = y + 'px';
        animId = requestAnimationFrame(step);
      }

      animId = requestAnimationFrame(step);
    }

    function fallThenBounce() {
      cancelAnimationFrame(animId);
      let fallVel = 0;
      let fallY = y;
      let last = performance.now();

      function fallDown(now) {
        const dt = Math.min((now - last) / 1000, 0.03);
        last = now;
        fallVel += gravity * dt;
        fallY += fallVel * dt;
        circle.style.top = fallY + 'px';

        if (fallY > window.innerHeight) {
          initBounce();
        } else {
          requestAnimationFrame(fallDown);
        }
      }

      requestAnimationFrame(fallDown);
    }

    initBounce();

    circle.addEventListener('click', fallThenBounce);

    let lastSize = getSize();
    window.addEventListener('resize', () => {
      const newSize = getSize();
      if (newSize !== lastSize) {
        lastSize = newSize;
        fallThenBounce();
      }
    });
  </script>
</body>
</html>
